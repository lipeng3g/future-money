name: CI (Strict weekly)

on:
  schedule:
    # Weekly strict build budget + oversize chunk verification.
    # Runs on default branch only.
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-strict-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify_strict:
    runs-on: ubuntu-latest

    env:
      CI_STRICT_BUILD_BUDGET: '1'
      CI_STRICT_VITE_OVERSIZE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (lockfile)
        run: |
          echo "node: $(node -v)"
          echo "npm:  $(npm -v)"
          npm ci --prefer-offline --no-audit

      - name: Smoke tests
        run: npm run smoke

      - name: Build verify (chunks + log) [strict]
        run: npm run build:verify
